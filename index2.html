<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Traci Love</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #dff3ff;
    color: #222;
    display: flex;
    justify-content: center;
    padding: 20px;
  }

  .container {
    width: 100%;
    max-width: 520px;
  }

  .card {
    background: #ffffff;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 10px 28px rgba(0,0,0,0.15);
    border: 2px solid #cc0000;
  }

  .image-wrap {
    padding: 14px;
  }

  .image-wrap img {
    width: 100%;
    border-radius: 14px;
    display: block;
    object-fit: cover;
    max-height: 620px;
  }

  .content {
    padding: 22px 20px 26px;
    text-align: center;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    margin-bottom: 0.4em;
    color: #cc0000;
  }

  .tagline {
    font-size: 1.05rem;
    margin-bottom: 1.6em;
    color: #444;
    line-height: 1.5;
  }

  .cta {
    width: 100%;
    background: #cc0000;
    color: #fff;
    border: none;
    padding: 1.1em;
    font-size: 1.05rem;
    font-weight: 600;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.25s ease;
    letter-spacing: 0.02em;
  }

  .cta:hover {
    background: #a80000;
  }

  .subtext {
    margin-top: 1rem;
    font-size: 0.85rem;
    color: #666;
  }

  footer {
    text-align: center;
    font-size: 0.75rem;
    color: #777;
    padding: 16px;
  }

  /* Spinner */
  #spinner-overlay {
    position: fixed;
    inset: 0;
    display: none;
    place-items: center;
    background: rgba(255,255,255,0.85);
    z-index: 9999;
  }

  .spinner {
    width: 48px;
    height: 48px;
    border: 6px solid #ccc;
    border-top: 6px solid #cc0000;
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Dialog */
  #warning-dialog {
    position: fixed;
    inset: 0;
    display: none;
    place-items: center;
    background: rgba(0,0,0,0.6);
    z-index: 10000;
  }

  .dialog-box {
    background: #fff;
    padding: 1.5rem;
    border-radius: 12px;
    max-width: 320px;
    text-align: center;
  }

  .dialog-box h2 {
    color: #cc0000;
    margin-bottom: 0.5em;
    font-family: 'Playfair Display', serif;
  }

  .dialog-buttons {
    margin-top: 1rem;
    display: flex;
    gap: 1rem;
    justify-content: center;
  }

  .dialog-buttons button {
    padding: 0.6rem 1.2rem;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
  }

  .ok {
    background: #cc0000;
    color: #fff;
  }

  .cancel {
    background: #ccc;
  }

  /* Mobile */
  @media (max-width: 480px) {
    h1 { font-size: 1.7rem; }
    .cta { font-size: 1rem; }
  }
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="image-wrap">
      <img src="traci-love.jpg" alt="Traci Love">
    </div>

    <div class="content">
      <h1>Traci Love</h1>

      <p class="tagline">
        A private space where we can connect more personally. 
        Click below to continue.
      </p>

      <button id="cta" class="cta">
        Enter Private Access
      </button>

      <p class="subtext">
        You must be 18 years or older to proceed.
      </p>
    </div>

    <footer>
      © 2026 Traci Love · All rights reserved
    </footer>

  </div>
</div>

<!-- Spinner -->
<div id="spinner-overlay">
  <div class="spinner"></div>
</div>

<!-- Warning Dialog -->
<div id="warning-dialog">
  <div class="dialog-box">
    <h2>18+ Only</h2>
    <p>This page leads to adult content. Continue?</p>
    <div class="dialog-buttons">
      <button class="ok">Continue</button>
      <button class="cancel">Cancel</button>
    </div>
  </div>
</div>

<script>
function detectSource() {
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.has("utm_source")) return urlParams.get("utm_source");

  const ref = (document.referrer || "").toLowerCase();
  if (ref.includes("instagram.com")) return "instagram";
  if (ref.includes("facebook.com")) return "facebook";
  if (ref.includes("reddit.com")) return "reddit";
  if (ref.includes("x.com") || ref.includes("twitter.com")) return "x";
  if (ref.includes("bsky.app")) return "bluesky";
  return "default";
}

function getRedirectURL(source) {
  switch (source) {
    case "instagram": return "https://instagram.tracilovestoplay.com/traci04";
    case "reddit": return "https://reddit.tracilovestoplay.com/traci05";
    case "x":
    case "twitter": return "https://x.tracilovestoplay.com/traci12";
    case "bluesky": return "https://bluesky.tracilovestoplay.com/traci13";
    default: return "https://connect.tracilovestoplay.com/traci01";
  }
}

const cta = document.getElementById("cta");
const spinner = document.getElementById("spinner-overlay");
const dialog = document.getElementById("warning-dialog");

const okBtn = dialog.querySelector(".ok");
const cancelBtn = dialog.querySelector(".cancel");

cta.addEventListener("click", () => {
  dialog.style.display = "grid";
});

okBtn.addEventListener("click", () => {
  dialog.style.display = "none";
  spinner.style.display = "grid";

  const source = detectSource();
  const redirectURL = getRedirectURL(source);

  setTimeout(() => {
    window.location.href = redirectURL;
  }, 1200);
});

cancelBtn.addEventListener("click", () => {
  dialog.style.display = "none";
});
</script>

</body>
</html>
